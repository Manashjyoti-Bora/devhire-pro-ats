<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 240" width="1180" height="240" role="img" aria-label="DevHire Pro — ATS interface banner">
<defs>
<linearGradient id="dg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#4338ca"><animate attributeName="stop-color" values="#4338ca;#818cf8;#4338ca" dur="6s" repeatCount="indefinite"/></stop>
  <stop offset="100%" stop-color="#818cf8"><animate attributeName="stop-color" values="#818cf8;#4338ca;#818cf8" dur="6s" repeatCount="indefinite"/></stop>
</linearGradient>
<clipPath id="dc"><rect width="1180" height="240" rx="18"/></clipPath>
<clipPath id="cardclip"><rect x="700" y="40" width="300" height="160" rx="8"/></clipPath>
</defs>
<g clip-path="url(#dc)">
<rect width="1180" height="240" fill="#1e1b4b"/>
<text x="80" y="115" font-family="Arial Black,Arial" font-weight="900" font-size="58" fill="url(#dg)">DEVHIRE PRO</text>
<text x="82" y="152" font-family="monospace" font-size="16" fill="#94a3b8">job portal + ATS · a study in dense, stateful interfaces</text>
<text x="82" y="190" font-family="monospace" font-size="15" fill="#818cf8" opacity="0">5 UI experiments · React 19 + Vite<animate attributeName="opacity" values="0;1" begin="1s" dur="0.4s" fill="freeze"/></text>
<g>
  <rect x="700" y="40" width="300" height="160" rx="8" fill="#0f172a" stroke="#4338ca"/>
  <rect x="716" y="60" width="120" height="10" rx="5" fill="#334155"/>
  <rect x="716" y="80" width="220" height="8" rx="4" fill="#1e293b"/>
  <rect x="716" y="96" width="190" height="8" rx="4" fill="#1e293b"/>
  <rect x="716" y="112" width="240" height="8" rx="4" fill="#1e293b"/>
  <rect x="716" y="128" width="160" height="8" rx="4" fill="#1e293b"/>
  <g clip-path="url(#cardclip)">
    <rect x="700" y="40" width="300" height="26" fill="#818cf8" opacity="0.22"><animate attributeName="y" values="30;200;30" dur="3.2s" repeatCount="indefinite"/></rect>
  </g>
  <rect x="716" y="152" width="0" height="12" rx="6" fill="url(#dg)"><animate attributeName="width" values="0;225" begin="0.6s" dur="1.8s" fill="freeze"/></rect>
  <text x="716" y="188" font-family="monospace" font-size="15" font-weight="bold" fill="#a5b4fc" opacity="0">MATCH: 94% ✓<animate attributeName="opacity" values="0;1" begin="2.5s" dur="0.4s" fill="freeze"/></text>
</g>
<rect x="0" y="234" width="1180" height="6" fill="url(#dg)"><animate attributeName="width" values="0;1180" dur="2s" fill="freeze"/></rect>
</g>
<rect x="1" y="1" width="1178" height="238" rx="18" fill="none" stroke="url(#dg)" stroke-width="1.4" opacity="0.6"/>
</svg>
